<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0099cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005580;stop-opacity:1" />
    </linearGradient>
    <style>
      .logo-main-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 42px; font-weight: 900; fill: #1a1a1a; letter-spacing: -1px; }
      .logo-tagline { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; font-weight: 700; fill: #0099cc; letter-spacing: 2px; text-transform: uppercase; }
    </style>
  </defs>
  
  <!-- Logo Icon -->
  <g transform="translate(10, 30)">
    <!-- Heavy industrial base -->
    <rect x="10" y="80" width="70" height="4" fill="#0099cc" rx="0.5"/>
    <rect x="10" y="76" width="70" height="2" fill="#005580" rx="0.5"/>
    
    <!-- Main warehouse structure - bold -->
    <rect x="10" y="20" width="70" height="56" fill="none" stroke="#0099cc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Roof - sharp -->
    <polygon points="10,20 45,5 80,20" fill="none" stroke="#0099cc" stroke-width="2.5" stroke-linejoin="round"/>
    
    <!-- Roof ridge -->
    <line x1="10" y1="20" x2="80" y2="20" stroke="#ffdb58" stroke-width="1.5"/>
    
    <!-- Twin loading doors -->
    <g stroke="#0099cc" stroke-width="2" fill="none">
      <rect x="17" y="32" width="25" height="35" rx="1"/>
      <rect x="48" y="32" width="25" height="35" rx="1"/>
      <line x1="42.5" y1="32" x2="42.5" y2="67" stroke-width="1.5"/>
    </g>
    
    <!-- Door handles -->
    <g fill="#ffdb58" opacity="0.9">
      <circle cx="29" cy="50" r="1.5"/>
      <circle cx="60" cy="50" r="1.5"/>
    </g>
    
    <!-- Industrial windows -->
    <g stroke="#0099cc" stroke-width="1" fill="none">
      <rect x="13" y="23" width="9" height="7" rx="0.5"/>
      <line x1="17.5" y1="23" x2="17.5" y2="30"/>
      <line x1="13" y1="26" x2="22" y2="26"/>
      
      <rect x="66" y="23" width="9" height="7" rx="0.5"/>
      <line x1="70.5" y1="23" x2="70.5" y2="30"/>
      <line x1="66" y1="26" x2="75" y2="26"/>
    </g>
    
    <!-- Corner brackets -->
    <g stroke="#ffdb58" stroke-width="1.5" fill="none" stroke-linecap="round">
      <line x1="10" y1="20" x2="20" y2="20"/>
      <line x1="10" y1="20" x2="10" y2="30"/>
      <line x1="80" y1="20" x2="70" y2="20"/>
      <line x1="80" y1="20" x2="80" y2="30"/>
    </g>
  </g>
  
  <!-- Text Lockup -->
  <text x="110" y="90" class="logo-main-text">INDUSTRIAL</text>
  <text x="110" y="140" class="logo-main-text">STORAGE</text>
  <text x="110" y="165" class="logo-tagline">PROFESSIONAL WAREHOUSE SPACE</text>
</svg>
