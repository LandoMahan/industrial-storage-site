<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003d66;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0099cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004080;stop-opacity:1" />
    </linearGradient>
    <pattern id="steelPattern" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="4" fill="#0099cc" opacity="0.08"/>
    </pattern>
    <style>
      .logo-main-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 48px; font-weight: 900; fill: #1a1a1a; letter-spacing: -1.5px; }
      .logo-tagline { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; font-weight: 800; fill: #0099cc; letter-spacing: 2.5px; text-transform: uppercase; }
    </style>
  </defs>
  
  <!-- Logo Icon -->
  <g transform="translate(5, 25)">
    <!-- Heavy base -->
    <rect x="8" y="82" width="84" height="6" fill="#0099cc" rx="1"/>
    <rect x="8" y="76" width="84" height="4" fill="#003d66" rx="1"/>
    <rect x="8" y="72" width="84" height="2" fill="#ffdb58" rx="0.5"/>
    
    <!-- Steel columns -->
    <g stroke="#003d66" stroke-width="1.8" fill="none">
      <line x1="22" y1="20" x2="22" y2="82" opacity="0.7"/>
      <line x1="78" y1="20" x2="78" y2="82" opacity="0.7"/>
    </g>
    
    <!-- Main box -->
    <rect x="8" y="20" width="84" height="52" fill="url(#steelPattern)" stroke="url(#metalGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Roof -->
    <polygon points="8,20 50,4 92,20" fill="none" stroke="url(#metalGradient)" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Roof ridge beam -->
    <rect x="48" y="2" width="4" height="19" fill="#003d66" opacity="0.6"/>
    
    <!-- Roof line accent -->
    <line x1="8" y1="20" x2="92" y2="20" stroke="#ffdb58" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Twin doors -->
    <g stroke="url(#metalGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="15" y="32" width="30" height="33" rx="2"/>
      <rect x="55" y="32" width="30" height="33" rx="2"/>
      <line x1="50" y1="32" x2="50" y2="65" stroke-width="2.5"/>
    </g>
    
    <!-- Door reinforcement -->
    <g stroke="#ffdb58" stroke-width="1.5" fill="none">
      <line x1="15" y1="30.5" x2="85" y2="30.5" stroke-width="2" opacity="0.8"/>
      <line x1="15" y1="66.5" x2="85" y2="66.5" stroke-width="2" opacity="0.8"/>
    </g>
    
    <!-- Heavy bolt handles -->
    <g fill="#ffdb58" opacity="0.95">
      <circle cx="30" cy="48" r="2"/>
      <circle cx="70" cy="48" r="2"/>
      <circle cx="30" cy="48" r="1.2" fill="none" stroke="#0099cc" stroke-width="1" opacity="0.6"/>
      <circle cx="70" cy="48" r="1.2" fill="none" stroke="#0099cc" stroke-width="1" opacity="0.6"/>
    </g>
    
    <!-- Security windows -->
    <g stroke="#0099cc" stroke-width="1.2" fill="none">
      <rect x="11" y="23" width="11" height="9" rx="1" stroke-width="1.5"/>
      <line x1="16.5" y1="23" x2="16.5" y2="32" stroke-width="1"/>
      <line x1="11" y1="27.5" x2="22" y2="27.5" stroke-width="1"/>
      
      <rect x="68" y="23" width="11" height="9" rx="1" stroke-width="1.5"/>
      <line x1="73.5" y1="23" x2="73.5" y2="32" stroke-width="1"/>
      <line x1="68" y1="27.5" x2="79" y2="27.5" stroke-width="1"/>
    </g>
    
    <!-- Corner braces -->
    <g stroke="#ffdb58" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="8" y1="20" x2="20" y2="20"/>
      <line x1="8" y1="20" x2="8" y2="32"/>
      <line x1="92" y1="20" x2="80" y2="20"/>
      <line x1="92" y1="20" x2="92" y2="32"/>
    </g>
    
    <!-- Gold peak -->
    <polygon points="50,4 49,12 51,12" fill="#ffdb58" opacity="1"/>
  </g>
  
  <!-- Text -->
  <text x="115" y="100" class="logo-main-text">INDUSTRIAL</text>
  <text x="115" y="155" class="logo-main-text">STORAGE</text>
  <text x="115" y="180" class="logo-tagline">PROFESSIONAL WAREHOUSE SPACE</text>
</svg>
