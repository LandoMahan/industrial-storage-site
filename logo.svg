<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Warehouse Building Icon -->
  <defs>
    <linearGradient id="warehouseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0099cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077aa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main warehouse structure -->
  <rect x="30" y="60" width="140" height="95" fill="none" stroke="url(#warehouseGradient)" stroke-width="3" rx="2"/>
  
  <!-- Roof -->
  <polygon points="30,60 100,20 170,60" fill="none" stroke="url(#warehouseGradient)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Large loading door -->
  <rect x="50" y="85" width="100" height="70" fill="none" stroke="#0099cc" stroke-width="2.5"/>
  
  <!-- Door divide line -->
  <line x1="100" y1="85" x2="100" y2="155" stroke="#0099cc" stroke-width="2"/>
  
  <!-- Door handles -->
  <circle cx="75" cy="120" r="3" fill="#0099cc"/>
  <circle cx="125" cy="120" r="3" fill="#0099cc"/>
  
  <!-- Small windows -->
  <rect x="35" y="65" width="15" height="12" fill="none" stroke="#0099cc" stroke-width="1.5" rx="1"/>
  <rect x="150" y="65" width="15" height="12" fill="none" stroke="#0099cc" stroke-width="1.5" rx="1"/>
  
  <!-- Roofline accent (gold) -->
  <line x1="30" y1="60" x2="170" y2="60" stroke="#ffdb58" stroke-width="2" opacity="0.8"/>
  
  <!-- Foundation line -->
  <line x1="30" y1="155" x2="170" y2="155" stroke="#0099cc" stroke-width="2"/>
  
  <!-- Accent geometric shape (represents structure/growth) -->
  <polygon points="100,30 105,40 95,40" fill="#ffdb58" opacity="0.9"/>
</svg>
