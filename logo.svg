<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003d66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Heavy base foundation -->
  <rect x="15" y="160" width="170" height="15" fill="#0099cc" rx="2"/>
  <rect x="15" y="150" width="170" height="8" fill="#003d66"/>
  <rect x="15" y="145" width="170" height="4" fill="#ffdb58"/>
  
  <!-- Main warehouse structure -->
  <rect x="15" y="45" width="170" height="110" fill="none" stroke="#0099cc" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Roof - simple triangle -->
  <polygon points="15,45 100,8 185,45" fill="none" stroke="#0099cc" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Gold roof line accent -->
  <line x1="15" y1="45" x2="185" y2="45" stroke="#ffdb58" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Simple large twin doors -->
  <g stroke="#0099cc" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="25" y="70" width="70" height="75" rx="3"/>
    <rect x="105" y="70" width="70" height="75" rx="3"/>
    <line x1="100" y1="70" x2="100" y2="145" stroke-width="5"/>
  </g>
  
  <!-- Big gold door handles -->
  <circle cx="60" cy="107" r="5" fill="#ffdb58"/>
  <circle cx="140" cy="107" r="5" fill="#ffdb58"/>
  
  <!-- Simple security windows - large and clear -->
  <g stroke="#0099cc" stroke-width="3" fill="none" stroke-linecap="round">
    <rect x="20" y="50" width="30" height="25" rx="2"/>
    <line x1="35" y1="50" x2="35" y2="75"/>
    <line x1="20" y1="62" x2="50" y2="62"/>
    
    <rect x="150" y="50" width="30" height="25" rx="2"/>
    <line x1="165" y1="50" x2="165" y2="75"/>
    <line x1="150" y1="62" x2="180" y2="62"/>
  </g>
  
  <!-- Corner braces - bold gold -->
  <g stroke="#ffdb58" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="15" y1="45" x2="40" y2="45"/>
    <line x1="15" y1="45" x2="15" y2="70"/>
    
    <line x1="185" y1="45" x2="160" y2="45"/>
    <line x1="185" y1="45" x2="185" y2="70"/>
  </g>
  
  <!-- Gold peak at roof top -->
  <polygon points="100,8 96,22 104,22" fill="#ffdb58"/>
</svg>
